spring.application.name=PersonDataHub
server.port=8080

spring.datasource.url=jdbc:mysql://localhost:3306/person_data_hub?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=*****

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=false

spring.data.redis.host=localhost
spring.data.redis.port=6379
app.cache.ttl-hours=24

app.cors.allowed-origins=http://localhost:5173,http://127.0.0.1:5173,http://localhost:5500,http://127.0.0.1:5500

# SLF4J (console via Spring Boot defaults)
logging.level.com.persondatahub.peopledirectory=INFO
